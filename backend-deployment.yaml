apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: backend
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: backend
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert
        kompose.version: 1.34.0 (cbf2835db)
      labels:
        io.kompose.service: backend
    spec:
      containers:
        - env:
            - name: DB_HOST
              value: db
            - name: DB_NAME
              value: jerney_db
            - name: DB_PASSWORD
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: jerney_user
            - name: PORT
              value: "5000"
          image: backend
          name: jerney-backend
          ports:
            - containerPort: 5000
              protocol: TCP
          resources:
            limits:
              cpu: 500m
              memory: "268435456"
            requests:
              cpu: 250m
              memory: "134217728"
          securityContext:
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: /app/data
              name: backend-claim0
            - mountPath: /tmp
              name: backend-tmpfs0
      restartPolicy: Always
      volumes:
        - name: backend-claim0
          persistentVolumeClaim:
            claimName: backend-claim0
        - emptyDir:
            medium: Memory
          name: backend-tmpfs0
