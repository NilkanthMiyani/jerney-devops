# GCPBackendPolicy overrides the default health check path for Gateway API backends.
# Without this, the GCP LB checks GET / on each service — API-only services return
# 404 which marks them unhealthy → 503 for all traffic.
apiVersion: networking.gke.io/v1
kind: GCPBackendPolicy
metadata:
  name: jerney-backend-health
  namespace: jerney
spec:
  targetRef:
    group: ""
    kind: Service
    name: jerney-backend
  default:
    healthCheck:
      requestPath: /api/posts
      type: HTTP
