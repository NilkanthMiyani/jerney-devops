apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jerney
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/NilkanthMiyani/jerney-devops.git
    targetRevision: main
    path: k8s-gke/helm/jerney
  destination:
    server: https://kubernetes.default.svc
    namespace: jerney
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - group: networking.gke.io
      kind: GCPBackendPolicy
      jsonPointers:
        - /spec/default/healthCheck/checkIntervalSec
        - /spec/default/healthCheck/timeoutSec
        - /spec/default/healthCheck/healthyThreshold
        - /spec/default/healthCheck/unhealthyThreshold
        - /spec/default/healthCheck/port
        - /spec/default/healthCheck/portSpecification
        - /spec/default/healthCheck/logConfig
