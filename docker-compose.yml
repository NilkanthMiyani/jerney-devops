services:
  db:
    image: postgres:16-alpine
    container_name: jerney-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: jerney_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: jerney_db
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U jerney_user -d jerney_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Security: read-only root filesystem where possible
    tmpfs:
      - /tmp
      - /run
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
        reservations:
          memory: 256m
          cpus: '0.25'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jerney-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: jerney_user
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: jerney_db
      OTEL_RESOURCE_ATTRIBUTES: "service.name=jerney-backend"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://signoz-otel-collector:4317"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
    volumes:
      - ./data/backend:/app/data
    expose:
      - "5000"
    depends_on:
      db:
        condition: service_healthy

    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
        reservations:
          memory: 128m
          cpus: '0.25'
    networks:
      - signoz-net
      - default

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jerney-frontend
    restart: unless-stopped
    ports:
      - "3000:8080"
    depends_on:
      - backend
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'
        reservations:
          memory: 64m
          cpus: '0.10'

networks:
  signoz-net:
    external: true
