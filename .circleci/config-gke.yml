# ==============================================================
# Jerney - GKE DevSecOps Pipeline (CircleCI)
#
# Separate pipeline for GKE infrastructure and deployments.
# Original EC2 pipeline stays in config.yml — this file is
# registered as a second pipeline in CircleCI Project Settings.
#
# HOW TO REGISTER THIS AS A SECOND PIPELINE:
#   CircleCI → Project Settings → Pipelines → Add Pipeline
#   Name: devsecops-gke
#   Config file path: .circleci/config-gke.yml
#   Trigger: push (auto)
#
# WHAT IT DOES DIFFERENTLY FROM config.yml (EC2):
#   - IaC scan: scans terraform-gke/ and k8s-gke/
#   - update-manifest: bumps image tags in k8s-gke/helm/jerney/values.yaml
#     (ArgoCD on GKE watches this file, not k8s/helm/jerney/values.yaml)
# ==============================================================

version: 2.1

orbs:
  node: circleci/node@5
  docker: circleci/docker@2

executors:
  node-executor:
    docker:
      - image: cimg/node:20.18   # >=20.6.0 required by OpenTelemetry packages
  python-executor:
    docker:
      - image: cimg/python:3.11

# ==============================================================
# JOBS
# ==============================================================
jobs:

  # ---- Stage 1: Lint ----
  lint:
    parameters:
      component:
        type: string
    executor: node-executor
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
          app-dir: << parameters.component >>
      - run:
          name: Run ESLint
          working_directory: << parameters.component >>
          command: npm run lint

  # ---- Stage 2: SCA (Dependency Audit) ----
  sca:
    parameters:
      component:
        type: string
    executor: node-executor
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
          app-dir: << parameters.component >>
      - run:
          name: npm audit
          working_directory: << parameters.component >>
          command: npm audit --audit-level=high || true

  # ---- Stage 3: Build & Push Docker Image ----
  build:
    parameters:
      component:
        type: string
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: false
      - run:
          name: Build and push image
          command: |
            IMAGE_TAG=$(git rev-parse --short HEAD)
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

            docker build \
              -t docker.io/$DOCKERHUB_USERNAME/jerney-<< parameters.component >>:${IMAGE_TAG} \
              -t docker.io/$DOCKERHUB_USERNAME/jerney-<< parameters.component >>:latest \
              ./<< parameters.component >>

            if [ "$CIRCLE_PR_NUMBER" = "" ]; then
              docker push docker.io/$DOCKERHUB_USERNAME/jerney-<< parameters.component >>:${IMAGE_TAG}
              docker push docker.io/$DOCKERHUB_USERNAME/jerney-<< parameters.component >>:latest
            fi

  # ---- Stage 4: Image Scan (Trivy) ---- 
  image-scan:
    parameters:
      component:
        type: string
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: false
      - run:
          name: Build image for scanning
          command: docker build -t jerney-<< parameters.component >>:scan ./<< parameters.component >>
      - run:
          name: Install Trivy
          command: |
            curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
              | sudo sh -s -- -b /usr/local/bin
      - run:
          name: Run Trivy vulnerability scan
          command: |
            trivy image \
              --exit-code 1 \
              --ignore-unfixed \
              --vuln-type os,library \
              --severity CRITICAL,HIGH \
              --timeout 10m \
              jerney-<< parameters.component >>:scan || true

  # ---- Stage 5: IaC Scan (Checkov) — GKE ----
  # Scans terraform-gke/ (google provider) and k8s-gke/ manifests.
  # No --skip-check needed: GKE checks are less strict than EC2 checks.
  iac-scan-gke:
    executor: python-executor
    steps:
      - checkout
      - run:
          name: Install Checkov
          command: pip install checkov
      - run:
          name: Checkov - Terraform (terraform-gke/)
          command: checkov -d terraform-gke/ --framework terraform || true
      - run:
          name: Checkov - Kubernetes (k8s-gke/)
          # --soft-fail: Helm templates have Go {{ }} syntax which isn't valid YAML
          command: checkov -d k8s-gke/ --framework kubernetes --soft-fail || true

  # ---- Stage 6: Dockerfile Lint (Hadolint) ----
  dockerfile-lint:
    parameters:
      component:
        type: string
    docker:
      - image: hadolint/hadolint:latest-debian
    steps:
      - checkout
      - run:
          name: Run Hadolint
          command: hadolint << parameters.component >>/Dockerfile || true

  # ---- Stage 7: Update GKE Helm Values ----
  # Updates k8s-gke/helm/jerney/values.yaml with the new image tag.
  # ArgoCD on GKE watches this file — the tag bump triggers a rolling deploy.
  update-manifest-gke:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: Install yq
          command: |
            sudo wget -qO /usr/local/bin/yq \
              https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo chmod a+x /usr/local/bin/yq
      - run:
          name: Update image tags in k8s-gke/helm/jerney/values.yaml
          command: |
            IMAGE_TAG=$(git rev-parse --short HEAD)
            echo "Updating GKE images to tag: ${IMAGE_TAG}"
            yq e ".image.backend.tag = \"${IMAGE_TAG}\"" -i k8s-gke/helm/jerney/values.yaml
            yq e ".image.frontend.tag = \"${IMAGE_TAG}\"" -i k8s-gke/helm/jerney/values.yaml
      - run:
          name: Commit and push manifest update
          command: |
            git config user.name "circleci-bot"
            git config user.email "circleci-bot@noreply"
            git add k8s-gke/helm/jerney/values.yaml
            git diff --cached --quiet && echo "No changes" && exit 0
            git commit -m "ci: update gke helm image tags to $(git rev-parse --short HEAD) [skip ci]"
            git pull --rebase origin main
            git push https://${GITHUB_TOKEN}@github.com/NilkanthMiyani/jerney-devops.git main

# ==============================================================
# WORKFLOW — GKE pipeline (auto on every push)
# ==============================================================
workflows:
  devsecops-gke:
    jobs:
      - lint:
          matrix:
            parameters:
              component: [backend, frontend]

      - sca:
          requires: [lint]
          matrix:
            parameters:
              component: [backend, frontend]

      - build:
          requires: [sca]
          context: dockerhub
          matrix:
            parameters:
              component: [backend, frontend]

      - image-scan:
          requires: [build]
          matrix:
            parameters:
              component: [backend, frontend]

      - iac-scan-gke:
          requires: [lint]

      - dockerfile-lint:
          matrix:
            parameters:
              component: [backend, frontend]

      - update-manifest-gke:
          requires: [build]
          context: dockerhub
          filters:
            branches:
              only: main
