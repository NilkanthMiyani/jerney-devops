apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: db
  name: db
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: db
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert
        kompose.version: 1.34.0 (cbf2835db)
      labels:
        io.kompose.service: db
    spec:
      containers:
        - env:
            - name: POSTGRES_DB
              value: jerney_db
            - name: POSTGRES_PASSWORD
            - name: POSTGRES_USER
              value: jerney_user
          image: postgres:16-alpine
          livenessProbe:
            exec:
              command:
                - pg_isready -U jerney_user -d jerney_db
            failureThreshold: 5
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          name: jerney-db
          ports:
            - containerPort: 5432
              protocol: TCP
          resources:
            limits:
              cpu: 500m
              memory: "536870912"
            requests:
              cpu: 250m
              memory: "268435456"
          volumeMounts:
            - mountPath: /tmp
              name: db-tmpfs0
            - mountPath: /run
              name: db-tmpfs1
      restartPolicy: Always
      volumes:
        - emptyDir:
            medium: Memory
          name: db-tmpfs0
        - emptyDir:
            medium: Memory
          name: db-tmpfs1
