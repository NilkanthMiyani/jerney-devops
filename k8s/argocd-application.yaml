apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jerney
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/NilkanthMiyani/jerney-devops.git
    targetRevision: main
    path: k8s
    directory:
      recurse: false
      include: jerney-minikube.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: jerney
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
